<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚗 Car Racing Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
  }
  #gameWrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  #topBar {
    display: flex;
    justify-content: space-between;
    width: 400px;
    padding: 8px 14px;
    background: rgba(255,255,255,0.1);
    border-radius: 30px;
    color: #fff;
    font-size: 15px;
    font-weight: 700;
  }
  #topBar span { color: #f9a825; }

  canvas {
    border: 4px solid #f9a825;
    border-radius: 8px;
    display: block;
    box-shadow: 0 0 30px rgba(249,168,37,0.4);
  }

  #overlay {
    position: absolute;
    top: 50px;
    left: 0; right: 0;
    width: 400px;
    margin: auto;
    height: 600px;
    background: rgba(0,0,0,0.82);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border: 4px solid #f9a825;
  }
  #overlay h1 { font-size: 36px; color: #f9a825; text-shadow: 0 0 20px #f9a825; }
  #overlay p  { font-size: 15px; color: #fff; text-align: center; line-height: 1.7; }
  #overlay .score-display { font-size: 22px; color: #4fc3f7; font-weight: 800; }
  #startBtn {
    background: linear-gradient(135deg, #f9a825, #ff6f00);
    color: #fff;
    border: none;
    padding: 14px 40px;
    border-radius: 30px;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(249,168,37,0.5);
    letter-spacing: 1px;
    transition: transform 0.1s;
  }
  #startBtn:hover { transform: scale(1.05); }

  #controls {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }
  .ctrl-btn {
    background: rgba(255,255,255,0.15);
    border: 2px solid #f9a825;
    color: #fff;
    font-size: 22px;
    width: 60px; height: 60px;
    border-radius: 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
    transition: background 0.1s;
  }
  .ctrl-btn:active { background: rgba(249,168,37,0.4); }
</style>
</head>
<body>
<div id="gameWrapper">
  <div id="topBar">
    <div>⏱ Time: <span id="timeDisplay">0</span>s</div>
    <div>🏆 Best: <span id="bestDisplay">0</span>s</div>
    <div>⚡ Speed: <span id="speedDisplay">1</span>x</div>
  </div>

  <canvas id="gameCanvas" width="400" height="600"></canvas>

  <div id="controls">
    <button class="ctrl-btn" id="leftBtn">◀</button>
    <button class="ctrl-btn" id="rightBtn">▶</button>
  </div>

  <div id="overlay">
    <h1>🚗 RACING</h1>
    <p>Dodge the traffic!<br>Use ◀ ▶ or Arrow Keys<br>Survive as long as possible!</p>
    <div class="score-display" id="finalScore" style="display:none"></div>
    <button id="startBtn">START GAME</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('startBtn');
const timeDisplay = document.getElementById('timeDisplay');
const bestDisplay = document.getElementById('bestDisplay');
const speedDisplay = document.getElementById('speedDisplay');
const finalScore = document.getElementById('finalScore');

const W = 400, H = 600;
const LANE_COUNT = 4;
const LANE_W = W / LANE_COUNT;

// Road markings
const stripes = Array.from({length: 10}, (_, i) => ({ y: i * 70 }));

// Player car
const player = { lane: 1, x: 0, y: H - 130, w: 50, h: 80, color: '#00e5ff' };

// Enemy cars - colorful
const enemyColors = ['#ff1744','#76ff03','#f9a825','#e040fb','#ff6d00','#00e676'];
let enemies = [];
let particles = [];

let running = false;
let gameTime = 0;
let bestTime = 0;
let speed = 3;
let spawnTimer = 0;
let animId;
let lastTime = 0;

function laneX(lane) { return lane * LANE_W + LANE_W / 2 - player.w / 2; }

function spawnEnemy() {
  const lane = Math.floor(Math.random() * LANE_COUNT);
  // avoid spawning same lane as player too often
  enemies.push({
    lane,
    x: laneX(lane),
    y: -90,
    w: 50, h: 80,
    color: enemyColors[Math.floor(Math.random() * enemyColors.length)],
    id: Math.random()
  });
}

function drawRoad() {
  // Road bg
  ctx.fillStyle = '#37474f';
  ctx.fillRect(0, 0, W, H);

  // Side grass
  ctx.fillStyle = '#2e7d32';
  ctx.fillRect(0, 0, 10, H);
  ctx.fillRect(W - 10, 0, 10, H);

  // Road surface
  ctx.fillStyle = '#455a64';
  ctx.fillRect(10, 0, W - 20, H);

  // Lane dividers
  for (let i = 1; i < LANE_COUNT; i++) {
    stripes.forEach(s => {
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fillRect(i * LANE_W - 2, s.y, 4, 45);
    });
  }

  // Edge lines
  ctx.fillStyle = '#fff';
  ctx.fillRect(10, 0, 4, H);
  ctx.fillRect(W - 14, 0, 4, H);
}

function drawCar(x, y, w, h, color, isPlayer) {
  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(x + 5, y + 10, w - 10, h - 20, 6);
  ctx.fill();

  // Roof
  ctx.fillStyle = isPlayer ? '#006064' : '#333';
  ctx.beginPath();
  ctx.roundRect(x + 10, y + 20, w - 20, h - 45, 5);
  ctx.fill();

  // Windshield
  ctx.fillStyle = 'rgba(150,240,255,0.7)';
  ctx.beginPath();
  ctx.roundRect(x + 12, y + 22, w - 24, 18, 3);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#212121';
  [[x + 3, y + 14], [x + w - 10, y + 14], [x + 3, y + h - 26], [x + w - 10, y + h - 26]].forEach(([wx, wy]) => {
    ctx.beginPath();
    ctx.roundRect(wx, wy, 7, 12, 2);
    ctx.fill();
  });

  // Headlights / taillights
  if (isPlayer) {
    ctx.fillStyle = '#fff176';
    ctx.beginPath(); ctx.arc(x + 12, y + 12, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w - 12, y + 12, 4, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.fillStyle = '#ff1744';
    ctx.beginPath(); ctx.arc(x + 12, y + h - 12, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + w - 12, y + h - 12, 4, 0, Math.PI * 2); ctx.fill();
  }
}

function spawnParticles(x, y) {
  for (let i = 0; i < 20; i++) {
    particles.push({
      x: x + 25, y: y + 40,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      r: Math.random() * 8 + 3,
      color: enemyColors[Math.floor(Math.random() * enemyColors.length)],
      life: 1
    });
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function updateParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.life -= 0.04;
    p.r *= 0.97;
  });
}

function checkCollision(e) {
  return !(player.x + 6 > e.x + e.w - 6 ||
           player.x + player.w - 6 < e.x + 6 ||
           player.y + 5 > e.y + e.h - 5 ||
           player.y + player.h - 5 < e.y + 5);
}

function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;

  // Update stripe scroll
  stripes.forEach(s => {
    s.y += speed * dt;
    if (s.y > H) s.y -= 700;
  });

  // Spawn enemies
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnEnemy();
    spawnTimer = Math.max(30, 80 - speed * 6);
  }

  // Move enemies
  enemies.forEach(e => { e.y += speed * dt * 1.1; });
  enemies = enemies.filter(e => e.y < H + 100);

  // Collision
  for (let e of enemies) {
    if (checkCollision(e)) {
      spawnParticles(player.x, player.y);
      endGame();
      // draw one last frame with particles
      drawRoad();
      enemies.forEach(en => drawCar(en.x, en.y, en.w, en.h, en.color, false));
      drawCar(player.x, player.y, player.w, player.h, '#ff1744', true);
      drawParticles();
      return;
    }
  }

  // Increase speed
  speed = 3 + Math.floor(gameTime / 8) * 0.5;
  speedDisplay.textContent = (1 + Math.floor(gameTime / 8) * 0.5).toFixed(1);
  gameTime += dt / 60;
  timeDisplay.textContent = Math.floor(gameTime);

  updateParticles();

  // Draw
  drawRoad();
  enemies.forEach(e => drawCar(e.x, e.y, e.w, e.h, e.color, false));
  drawCar(player.x, player.y, player.w, player.h, player.color, true);
  drawParticles();

  animId = requestAnimationFrame(gameLoop);
}

function startGame() {
  player.lane = 1;
  player.x = laneX(1);
  enemies = [];
  particles = [];
  gameTime = 0;
  speed = 3;
  spawnTimer = 60;
  running = true;
  overlay.style.display = 'none';
  finalScore.style.display = 'none';
  lastTime = performance.now();
  animId = requestAnimationFrame(gameLoop);
}

function endGame() {
  running = false;
  cancelAnimationFrame(animId);
  if (Math.floor(gameTime) > bestTime) {
    bestTime = Math.floor(gameTime);
    bestDisplay.textContent = bestTime;
  }
  finalScore.style.display = 'block';
  finalScore.textContent = `⏱ Your Time: ${Math.floor(gameTime)}s`;
  overlay.querySelector('h1').textContent = '💥 CRASHED!';
  startBtn.textContent = '▶ PLAY AGAIN';
  overlay.style.display = 'flex';
}

// Controls
let keys = {};
document.addEventListener('keydown', e => {
  if (!running) return;
  if ((e.key === 'ArrowLeft' || e.key === 'a') && player.lane > 0) {
    player.lane--;
    player.x = laneX(player.lane);
  }
  if ((e.key === 'ArrowRight' || e.key === 'd') && player.lane < LANE_COUNT - 1) {
    player.lane++;
    player.x = laneX(player.lane);
  }
});

document.getElementById('leftBtn').addEventListener('click', () => {
  if (!running || player.lane <= 0) return;
  player.lane--; player.x = laneX(player.lane);
});
document.getElementById('rightBtn').addEventListener('click', () => {
  if (!running || player.lane >= LANE_COUNT - 1) return;
  player.lane++; player.x = laneX(player.lane);
});

// Touch swipe
let touchStartX = 0;
canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
canvas.addEventListener('touchend', e => {
  if (!running) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (dx < -30 && player.lane > 0) { player.lane--; player.x = laneX(player.lane); }
  if (dx > 30 && player.lane < LANE_COUNT - 1) { player.lane++; player.x = laneX(player.lane); }
});

startBtn.addEventListener('click', startGame);

// Initial draw
drawRoad();
drawCar(laneX(1), player.y, player.w, player.h, player.color, true);
</script>
</body>
</html>
